services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfevigia
      POSTGRES_USER: nfevigia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nfevigia_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfevigia -d nfevigia"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nfevigia:${DB_PASSWORD:-nfevigia_dev_2026}@db:5432/nfevigia

volumes:
  pgdata:
