services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nfevigia}
      POSTGRES_USER: ${POSTGRES_USER:-nfevigia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nfevigia_dev_2026}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nfevigia} -d ${POSTGRES_DB:-nfevigia}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${POSTGRES_DB:-nfevigia}
      DB_USER: ${POSTGRES_USER:-nfevigia}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nfevigia_dev_2026}
      DB_HOST: db
      DB_PORT: "5432"

  # ── React Frontend (Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
